[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false

# Test configuration
test = "test"
gas_reports = ["*"]
gas_limit = "30000000"

# Coverage
verbosity = 2
fuzz_runs = 256

# Compiler settings
extra_output = ["storageLayout", "metadata"]
bytecode_hash = "none"

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
fuzz_runs = 10000
verbosity = 4

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
0g_testnet = "${0G_CHAIN_RPC_URL}"
